version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - go-cache:/home/dev/go/pkg
    command: sleep infinity
    environment:
      - GOPATH=/home/dev/go
