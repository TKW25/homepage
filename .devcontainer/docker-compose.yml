services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - go-cache:/home/dev/go/pkg
      - claude-config:/home/dev/.claude
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    environment:
      - GOPATH=/home/dev/go
      - DYNAMO_ENDPOINT=http://db:8000 
    depends_on:
      - db
      # db:
      #   condition: service_healthy

  db:
    image: amazon/dynamodb-local:3.3.0
    working_dir: /home/dynamodblocal
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - dynamo-data:/home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal"
    # healthcheck:
    #   test: ["CMD-SHELL", "ss -tlnp | grep 8000 || exit 1"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 10
    #   start_period: 10s

volumes:
  go-cache:
  claude-config:
  dynamo-data:
