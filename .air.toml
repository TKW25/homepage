# air - live reload for Go
# https://github.com/air-verse/air

[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  include_ext = ["go", "templ", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  delay = 500

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"
